name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install recent versions of clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-18 ninja-build clang-format-21

    - name: Check Code Formatting
      # This command returns a non-zero exit code if files need formatting
      run: |
        find src -name "*.cpp" -o -name "*.cppm" | xargs clang-format-21 --dry-run --Werror

    - name: Configure CMake
      run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_SCAN_FOR_MODULES=ON

    - name: Build Library
      run: cmake --build build

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure
