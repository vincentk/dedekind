name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 ninja-build clang-format-21

    - name: Check Code Formatting
      run: find src -name "*.cpp" -o -name "*.cppm" | xargs clang-format-21 --dry-run --Werror

    - name: Configure CMake
      # Note: CMAKE_CXX_COMPILER is required to use a recent clang.
      # Note: CMAKE_CXX_SCAN_FOR_MODULES is required for clang to find the module interfaces.
      # Note: Ninja is required for CMAKE_CXX_SCAN_FOR_MODULES to work.
      # Note: CMAKE_BUILD_TYPE=Release is required for the code to compile at all, due to the use of concepts and modules.
      run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_SCAN_FOR_MODULES=ON

    - name: Build Library
      run: cmake --build build

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure

    - name: Process Coverage Data
      run: |
        llvm-profdata-21 merge -sparse build/dedekind.profraw -o build/dedekind.profdata
        # Export to LCOV for Codecov
        llvm-cov-21 export ./build/dedekind_test -instr-profile=build/dedekind.profdata -format=lcov -ignore-filename-regex=".*_deps/.*" > build/coverage.info
        # Export to Cobertura XML for PR comment (using gcovr)
        pip install gcovr
        gcovr --add-tracefile build/coverage.info --xml build/coverage.xml


  deploy-docs:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Doxygen and Clang 21
      run: |
        wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21
        sudo apt-get install -y doxygen graphviz cmake ninja-build clang-21

    - name: Build Doxygen Documentation
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-21 \
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON
        cmake --build build --target docs

    - name: Add .nojekyll
      run: touch build/html/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'build/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Post Doc Link to PR
      if: github.event_name == 'pull_request'
      uses: thollander/actions-comment-pull-request@v2
      with:
        message: |
          📖 **Doxygen Documentation Preview:**
          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
