name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 ninja-build clang-format-21

    - name: Check Code Formatting
      run: find src -name "*.cpp" -o -name "*.cppm" | xargs clang-format-21 --dry-run --Werror

    - name: Configure CMake
      # Note: CMAKE_CXX_COMPILER is required to use a recent clang.
      # Note: CMAKE_CXX_SCAN_FOR_MODULES is required for clang to find the module interfaces.
      # Note: Ninja is required for CMAKE_CXX_SCAN_FOR_MODULES to work.
      # Note: CMAKE_BUILD_TYPE=Release is required for the code to compile at all, due to the use of concepts and modules.
      run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_SCAN_FOR_MODULES=ON

    - name: Build & Run Tests
      run: |
        cmake --build build
        # The %m ensures test_category, test_ontology, and test_sets 
        # each write to a unique .profraw file instead of clobbering 'dedekind.profraw'
        LLVM_PROFILE_FILE="build/dedekind-%m.profraw" ctest --test-dir build --output-on-failure -V

    - name: Process Coverage Data
      run: |
        # 1. Merge all generated .profraw files into one .profdata
        llvm-profdata-21 merge -sparse build/*.profraw -o build/dedekind.profdata
        
        # 2. Export coverage for all test binaries and static library objects
        llvm-cov-21 export \
          -instr-profile=build/dedekind.profdata \
          -format=lcov \
          -ignore-filename-regex=".*_deps/.*|.*test/.*" \
          ./build/test_category \
          ./build/test_ontology \
          ./build/test_sets \
          -object build/libdedekind_category.a \
          -object build/libdedekind_ontology.a \
          -object build/libdedekind_sets.a > build/coverage.info

        # 3. CRITICAL: Convert absolute paths to relative paths
        # This strips the GitHub Actions runner path so Codecov can map the files
        sed -i "s|$(pwd)/||g" build/coverage.info

        # 4. Verify the file has content and correct paths
        ls -sh build/coverage.info
        grep "SF:" build/coverage.info | head -n 5

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: build/coverage.info
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true


    # --- CONDITIONAL DEPLOYMENT STEPS ---
    
    - name: Build Doxygen Documentation
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        sudo apt-get install -y doxygen graphviz
        cmake --build build --target docs
        touch build/docs/html/.nojekyll

    - name: Upload artifact
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'build/docs/html' # Adjust to match your CMake DOXYGEN_OUTPUT_DIR

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: deployment
      uses: actions/deploy-pages@v4