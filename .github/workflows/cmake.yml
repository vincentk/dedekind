name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 ninja-build clang-format-21

    - name: Check Code Formatting
      run: make format-check CLANG_FORMAT=clang-format-21

    - name: Build & Run Tests
      run: make test CXX=clang++-21 CC=clang-21 CMAKE_EXTRA_ARGS="-DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON"

    - name: Process Coverage Data
      run: make coverage CXX=clang++-21 CC=clang-21 CMAKE_EXTRA_ARGS="-DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON"

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: build/coverage.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        verbose: true

    # --- CONDITIONAL DEPLOYMENT STEPS ---

    - name: Install Doxygen toolchain
      run: make ci-install-doxygen-deps
    
    - name: Build Doxygen Documentation
      run: make doxygen CXX=clang++-21 CC=clang-21 CMAKE_EXTRA_ARGS="-DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON"

    - name: Install report toolchain
      run: make ci-install-report-deps

    - name: Check Report Compilation
      run: make report

    - name: Build Publishable Report
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        make -C docs/report doc

    - name: Stage Pages content
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p build/pages
        cp -R build/docs/html/. build/pages/
        cp docs/report/report.pdf build/pages/report.pdf

    - name: Upload artifact
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'build/pages'

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: deployment
      uses: actions/deploy-pages@v4
