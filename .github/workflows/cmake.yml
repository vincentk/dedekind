name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 ninja-build clang-format-21

    - name: Check Code Formatting
      run: make format-check CLANG_FORMAT=clang-format-21

    - name: Build & Run Integration Tests
      run: make integration-test CXX=clang++-21 CC=clang-21 CMAKE_EXTRA_ARGS="-DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON"

    - name: Build Python Distribution Artifacts
      env:
        CC: clang-21
        CXX: clang++-21
        CMAKE_ARGS: >-
          -DCMAKE_C_COMPILER=clang-21
          -DCMAKE_CXX_COMPILER=clang++-21
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON
      run: |
        python -m pip install --upgrade pip build twine
        python -m build
        python -m twine check dist/*

    - name: Verify Installed Wheel Smoke Test
      run: |
        python -m venv .venv-wheel-smoke
        . .venv-wheel-smoke/bin/activate
        python -m pip install --upgrade pip
        python -m pip install dist/*.whl
        mkdir -p build/python-docs
        python -m pydoc dedekind > build/python-docs/pydoc-dedekind.txt
        python - <<'PY'
        import dedekind

        assert dedekind.ordered_set_roundtrip([3, 1, 2, 2]) == [1, 2, 3]
        assert dedekind.unordered_set_roundtrip([4, 2, 4, 1]) == [1, 2, 4]
        assert dedekind.path_from_range([2, 4, 6, 8]) == [2, 4, 6, 8]
        print("python-wheel-smoke-ok")
        PY

    - name: Upload Python Dist Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-dist
        path: |
          dist/*
          build/python-docs/pydoc-dedekind.txt

    - name: Process Coverage Data
      run: make coverage CXX=clang++-21 CC=clang-21 CMAKE_EXTRA_ARGS="-DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON"

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: build/coverage.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        verbose: true

    # --- CONDITIONAL DEPLOYMENT STEPS ---

    - name: Install Doxygen toolchain
      run: make ci-install-doxygen-deps
    
    - name: Build Doxygen Documentation
      run: make doxygen CXX=clang++-21 CC=clang-21 CMAKE_EXTRA_ARGS="-DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON"

    - name: Install report toolchain
      run: make ci-install-report-deps

    - name: Check Report Compilation
      run: make report

    - name: Build Publishable Report
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        make -C docs/report doc

    - name: Stage Pages content
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p build/pages
        cp -R build/docs/html/. build/pages/
        cp docs/report/report.pdf build/pages/report.pdf

    - name: Upload artifact
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'build/pages'

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: deployment
      uses: actions/deploy-pages@v4
