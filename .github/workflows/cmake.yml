name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 ninja-build clang-format-21 doxygen graphviz biber texlive-latex-base texlive-latex-extra texlive-pictures texlive-plain-generic texlive-fonts-recommended

    - name: Check Code Formatting
      run: find src -name "*.cpp" -o -name "*.cppm" | xargs clang-format-21 --dry-run --Werror

    - name: Configure CMake
      # Note: CMAKE_CXX_COMPILER is required to use a recent clang.
      # Note: CMAKE_CXX_SCAN_FOR_MODULES is required for clang to find the module interfaces.
      # Note: Ninja is required for CMAKE_CXX_SCAN_FOR_MODULES to work.
      # Note: CMAKE_BUILD_TYPE=Release is required for the code to compile at all, due to the use of concepts and modules.
      # Note: DEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON improves coverage attribution
      # for numeric bridge wrappers during Codecov runs.
      run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_SCAN_FOR_MODULES=ON -DDEDEKIND_RUNTIME_COVERAGE_BRIDGES=ON

    - name: Build & Run Tests
      run: |
        cmake --build build
        ctest --test-dir build --output-on-failure -V

    - name: Process Coverage Data
      run: cmake --build build --target generate_coverage

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: build/coverage.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        verbose: true

    # --- CONDITIONAL DEPLOYMENT STEPS ---
    
    - name: Build Doxygen Documentation
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cmake --build build --target docs

    - name: Build Report PDF
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      working-directory: docs/report
      run: |
        pdflatex -interaction=nonstopmode report.tex
        biber report
        pdflatex -interaction=nonstopmode report.tex
        pdflatex -interaction=nonstopmode report.tex

    - name: Stage Pages content
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p build/pages
        cp -R build/html/. build/pages/
        cp docs/report/report.pdf build/pages/report.pdf

    - name: Upload artifact
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'build/pages'

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: deployment
      uses: actions/deploy-pages@v4
