name: C++ CI with Cmake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang build chain
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 ninja-build clang-format-21

    - name: Check Code Formatting
      run: find src -name "*.cpp" -o -name "*.cppm" | xargs clang-format-21 --dry-run --Werror

    - name: Configure CMake
      run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_SCAN_FOR_MODULES=ON

    - name: Build Library
      run: cmake --build build

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure

  deploy-docs:
    needs: build
    runs-on: ubuntu-latest 
    # Optional: uncomment to restrict to main branch
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Doxygen and Build Tools
      run: sudo apt-get install -y doxygen graphviz cmake ninja-build

    - name: Build Doxygen Documentation
      run: |
        cmake -S . -B build -G Ninja
        cmake --build build --target docs

    - name: Add .nojekyll
      run: touch build/html/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'build/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
